name: Build and Sync VRF

on:
  schedule:
    - cron: '0 0 * * *' # 每天自动检查并编译一次
  workflow_dispatch:   # 允许你点击按钮手动立即编译

jobs:
  build:
    runs-on: windows-latest # VRF 包含 GUI 组件，使用 Windows 运行环境最稳妥

    steps:
      # 1. 检出你自己的仓库
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: my-repo

      # 2. 检出 ValveResourceFormat 仓库
      - name: Checkout VRF
        uses: actions/checkout@v4
        with:
          repository: ValveResourceFormat/ValveResourceFormat
          path: vrf-source
          submodules: recursive # 处理子模块

      # 3. 设置 .NET 环境
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # 根据该项目需求选择版本

      # 4. 编译项目 (以编译 CLI 工具为例)
      - name: Build VRF CLI
        run: |
          dotnet publish vrf-source/CLI/CLI.csproj -c Release -r win-x64 --self-contained -o ./publish-cli

      # 5. 将编译产物同步到你的仓库
      - name: Push to my repo root
        shell: pwsh
        run: |
          # 1. 切换到你的仓库目录
          cd $env:GITHUB_WORKSPACE/my-repo
          
          # 2. 将编译好的文件直接拷贝到仓库根目录下的 vrf-release 文件夹
          # 如果你想直接丢在根目录，就把 "vrf-release/" 改成 "./"
          New-Item -ItemType Directory -Force -Path vrf-release
          Copy-Item -Path "$env:GITHUB_WORKSPACE/publish-cli/*" -Destination "./" -Recurse -Force
          
          # 3. 配置 Git 信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 4. 添加、提交并推送
          git add .
          
          # 只有在有变化时才提交，避免 Action 报错
          $status = git status --porcelain
          if ($null -ne $status) {
              git commit -m "Auto-compiled VRF binaries"
              git push
          } else {
              Write-Host "No changes to commit, files are already up to date."
          }
