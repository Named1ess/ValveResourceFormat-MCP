name: Build and Sync VRF

on:
  schedule:
    - cron: '0 0 * * *' # 每天自动检查并编译一次
  workflow_dispatch:   # 允许你点击按钮手动立即编译

jobs:
  build:
    runs-on: windows-latest # VRF 包含 GUI 组件，使用 Windows 运行环境最稳妥

    steps:
      # 1. 检出你自己的仓库
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: my-repo

      # 2. 检出 ValveResourceFormat 仓库
      - name: Checkout VRF
        uses: actions/checkout@v4
        with:
          repository: ValveResourceFormat/ValveResourceFormat
          path: vrf-source
          submodules: recursive # 处理子模块

      # 3. 设置 .NET 环境
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # 根据该项目需求选择版本

      # 4. 编译项目 (以编译 CLI 工具为例)
      - name: Build VRF CLI
        run: |
          dotnet publish vrf-source/ValveResourceFormat/ValveResourceFormat.csproj -c Release -r win-x64 --self-contained -o ./publish-cli

      # 5. 将编译产物同步到你的仓库
      - name: Push to my repo
        shell: pwsh # 明确指定使用 PowerShell
        run: |
          # 1. 进入你的仓库
          cd my-repo
          
          # 2. 强制创建并拷贝文件（注意路径要对准你之前 -o 指定的目录）
          New-Item -ItemType Directory -Force -Path bin/vrf
          Copy-Item -Path "../publish-cli/*" -Destination "bin/vrf/" -Recurse -Force
          
          # 3. 配置 Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 4. 提交更改
          git add .
          
          # 检查是否有文件变动，防止因为无变动导致的 commit 报错
          $status = git status --porcelain
          if ($null -ne $status) {
              git commit -m "Routine update of VRF binaries"
              git push
          } else {
              Write-Host "No changes to commit."
          }
