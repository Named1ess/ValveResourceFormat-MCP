name: Build and Sync VRF

on:
  schedule:
    - cron: '0 0 * * *' # 每天自动检查并编译一次
  workflow_dispatch:   # 允许你点击按钮手动立即编译

jobs:
  build:
    runs-on: windows-latest # VRF 包含 GUI 组件，使用 Windows 运行环境最稳妥

    steps:
      # 1. 检出你自己的仓库
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: my-repo

      # 2. 检出 ValveResourceFormat 仓库
      - name: Checkout VRF
        uses: actions/checkout@v4
        with:
          repository: ValveResourceFormat/ValveResourceFormat
          path: vrf-source
          submodules: recursive # 处理子模块

      # 3. 设置 .NET 环境
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # 根据该项目需求选择版本

      # 4. 编译项目 (以编译 CLI 工具为例)
      - name: Build VRF CLI
        run: |
          dotnet publish vrf-source/ValveResourceFormat/ValveResourceFormat.csproj -c Release -r win-x64 --self-contained -o ./publish-cli

      # 5. 将编译产物同步到你的仓库
      - name: Push to my repo
        shell: pwsh
        run: |
          # 1. 确保进入正确的目录
          cd $env:GITHUB_WORKSPACE/my-repo
          
          # 2. 强制创建目录并【清空】旧文件，确保 Git 能感应到变化
          if (Test-Path "bin/vrf") { Remove-Item -Path "bin/vrf/*" -Recurse -Force }
          New-Item -ItemType Directory -Force -Path bin/vrf
          
          # 3. 拷贝新文件 (注意路径使用绝对路径避免混乱)
          Copy-Item -Path "$env:GITHUB_WORKSPACE/publish-cli/*" -Destination "bin/vrf/" -Recurse -Force
          
          # 4. 配置 Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 5. 提交
          git add .
          # 查看当前状态，确认 bin/vrf 下确实有文件
          git status
          
          $status = git status --porcelain
          if ($null -ne $status) {
              git commit -m "Update VRF binaries: $(Get-Date -Format 'yyyy-MM-dd HH:mm')"
              git push
          } else {
              Write-Host "Still no changes detected. Check if publish-cli is empty."
          }
